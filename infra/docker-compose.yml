services:
  db:
    image: postgres:16
    container_name: hadassahhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hadassahhub
      POSTGRES_USER: hadassahhub
      POSTGRES_PASSWORD: 1998yair1998
    ports:
      - "5432:5432"
    volumes:
      - hadassahhub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hadassahhub -d hadassahhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: hadassahhub-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hadassahhub.com
      PGADMIN_DEFAULT_PASSWORD: 1998yair1998
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  hadassahhub_pgdata:
